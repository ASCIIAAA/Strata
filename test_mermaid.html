<!DOCTYPE html>
<html>
<head>
    <title>Mermaid Test</title>
</head>
<body>
    <div id="mermaid-container" style="background-color: white; padding: 20px;">
        <pre class="mermaid">
sequenceDiagram
    participant System_out
    participant Util
    Util->>System_out: println()
        </pre>
        <script type="module">
            import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
            mermaid.initialize({ 
                startOnLoad: false, 
                theme: 'neutral',
                securityLevel: 'loose',
                maxTextSize: 900000,
                flowchart: { useMaxWidth: false }
            });
            await mermaid.run({ querySelector: '.mermaid' });
        </script>
    </div>
</body>
</html>
